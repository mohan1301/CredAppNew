# =====================================================================
# Frontend Service - ClusterIP (exposed externally via the Ingress)
# =====================================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: credpay
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: credpay
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
