variables:

  # Azure Container Registry Service Connection
  acrServiceConnection: 'cred-acr'
  azureServiceConnection: 'credpayserviceconnection'

  # Image Tag
  tag: '$(Build.BuildId)'

  # Repositories in ACR
  frontendRepository: 'credpay/frontend'
  userRepository: 'credpay/user-service'
  paymentRepository: 'credpay/payment-service'

    # Terraform Backend
